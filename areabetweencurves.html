<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Between Curves Calculator</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.0.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: #000;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #000;
        }
        .func-label {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
            color: #000;
        }
        .form-control {
            background-color: #f5f5ef;
            color: #000;
            border: 1px solid black;
        }
        .form-control:focus {
            background-color: #f5f5ef;
            border-color: #000;
            box-shadow: none;
        }
        .btn-success {
            background-color: #000;
            border-color: #000;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .btn-secondary {
            background-color: #555;
            border-color: #555;
        }
        .btn-secondary:hover {
            background-color: #333;
            border-color: #333;
        }
        .zoom-btn {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-container {
            position: relative;
            margin-top: 20px;
        }
        .result-box {
            text-align: center;
            font-size: 1.3rem;
            margin-top: 15px;
            color: #000;
        }
        .intersection-list {
            text-align: center;
            font-size: 1rem;
            margin-top: 5px;
            color: #555;
        }
        .segment-area {
            text-align: center;
            font-size: 1.15rem;
            color: #333;
            line-height: 2;
        }
        .segment-area .katex-display {
            margin: 0;
        }
        .segment-area .katex {
            font-size: 1em;
        }
        .segment-area table {
            width: 100%;
            color: #000;
        }
        .segment-area table th {
            background-color: #f5f5ef;
            color: #000;
            border: 2px solid black !important;
            text-align: center;
            font-weight: bold;
        }
        .segment-area table td {
            background-color: #f5f5ef;
            color: #000;
            border: 2px solid black !important;
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>

<div class="container">
    <h1>Area Between Curves Calculator</h1>

    <div class="form-row">
        <div class="form-group col-md-6">
            <label class="func-label">Curve 1: f(x) =</label>
            <input type="text" id="func1" class="form-control" value="x^2" placeholder="e.g. x^2, sin(x)">
        </div>
        <div class="form-group col-md-6">
            <label class="func-label">Curve 2: g(x) =</label>
            <input type="text" id="func2" class="form-control" value="x" placeholder="e.g. x, cos(x)">
        </div>
    </div>



    <div class="chart-container" id="chartContainer">
        <div style="position:absolute; top:-14px; right:8px; z-index:10; display:flex; gap:4px;">
            <button class="btn btn-success btn-sm zoom-btn" id="zoomInBtn">&#43;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomOutBtn">&minus;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomResetBtn">&#8634;</button>
        </div>

        <canvas id="functionChart"></canvas>
    </div>

    <div id="result" class="result-box"></div>
    <div id="intersections" class="intersection-list"></div>
    <div id="segments" class="segment-area"></div>
</div>

<script>
let chartInstance = null;
let currentSegments = [];
let currentRoots = [];
let zoomRange = 10;
const defaultZoomRange = 10;

function evaluatePoints(expr, xMin, xMax, steps) {
    const f = math.compile(expr);
    const points = [];
    const step = (xMax - xMin) / steps;
    for (let x = xMin; x <= xMax + step / 2; x += step) {
        try {
            const y = f.evaluate({x});
            if (isFinite(y)) points.push({x, y});
        } catch(e) {}
    }
    return points;
}

function bisect(f1, f2, a, b) {
    const tolerance = 1e-12;
    const maxIter = 60;
    let fa = f1.evaluate({x: a}) - f2.evaluate({x: a});
    let fb = f1.evaluate({x: b}) - f2.evaluate({x: b});

    if (Math.abs(fa) < 1e-14) return a;
    if (Math.abs(fb) < 1e-14) return b;

    for (let i = 0; i < maxIter; i++) {
        const c = (a + b) / 2;
        const fc = f1.evaluate({x: c}) - f2.evaluate({x: c});

        if (Math.abs(fc) < tolerance || (b - a) / 2 < tolerance) return c;

        if (fa * fc < 0) {
            b = c;
            fb = fc;
        } else {
            a = c;
            fa = fc;
        }
    }
    return (a + b) / 2;
}

function findIntersections(expr1, expr2, xMin, xMax) {
    const f1 = math.compile(expr1);
    const f2 = math.compile(expr2);
    const steps = 600;
    const roots = [];

    let prevX = xMin;
    let prevDiff = f1.evaluate({x: xMin}) - f2.evaluate({x: xMin});
    if (Math.abs(prevDiff) < 1e-10) roots.push(xMin);

    for (let i = 1; i <= steps; i++) {
        const x = xMin + (xMax - xMin) * i / steps;
        const diff = f1.evaluate({x}) - f2.evaluate({x});

        if (Math.abs(diff) < 1e-10) {
            if (roots.length === 0 || Math.abs(roots[roots.length - 1] - x) > 1e-8) roots.push(x);
        } else if (prevDiff * diff < 0) {
            const root = bisect(f1, f2, prevX, x);
            if (roots.length === 0 || Math.abs(roots[roots.length - 1] - root) > 1e-8) roots.push(root);
        }

        prevDiff = diff;
        prevX = x;
    }

    const diffEnd = f1.evaluate({x: xMax}) - f2.evaluate({x: xMax});
    if (Math.abs(diffEnd) < 1e-10 && (roots.length === 0 || Math.abs(roots[roots.length - 1] - xMax) > 1e-8)) {
        roots.push(xMax);
    }

    return roots.filter(r => r >= xMin && r <= xMax);
}

function calculateArea(expr1, expr2, a, b) {
    const f1 = math.compile(expr1);
    const f2 = math.compile(expr2);
    const n = 5000;
    const dx = (b - a) / n;
    let area = 0;
    for (let i = 0; i < n; i++) {
        const x1 = a + i * dx;
        const x2 = a + (i + 1) * dx;
        try {
            const y1 = Math.abs(f1.evaluate({x: x1}) - f2.evaluate({x: x1}));
            const y2 = Math.abs(f1.evaluate({x: x2}) - f2.evaluate({x: x2}));
            if (isFinite(y1) && isFinite(y2)) {
                area += (y1 + y2) / 2 * dx;
            }
        } catch(e) {}
    }
    return area;
}

const fillPlugin = {
    id: 'fillBetween',
    beforeDraw: function(chart) {
        const ctx = chart.ctx;
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        if (!xScale || !yScale) return;

        if (currentSegments.length === 0) return;

        const ds0 = chart.data.datasets[0].data;
        const ds1 = chart.data.datasets[1].data;
        if (!ds0 || !ds1) return;

        ctx.save();

        for (const seg of currentSegments) {
            const segMin = seg.from;
            const segMax = seg.to;

            const pts = [];
            const n = Math.min(ds0.length, ds1.length);
            for (let i = 0; i < n; i++) {
                const x = ds0[i].x;
                if (x >= segMin && x <= segMax) {
                    const y1 = ds0[i].y;
                    const y2 = ds1[i].y;
                    if (y1 !== null && y2 !== null && isFinite(y1) && isFinite(y2)) {
                        pts.push({x, y1, y2});
                    }
                }
            }

            if (pts.length < 2) continue;

            ctx.beginPath();
            ctx.moveTo(xScale.getPixelForValue(pts[0].x), yScale.getPixelForValue(pts[0].y1));
            for (let i = 1; i < pts.length; i++) {
                ctx.lineTo(xScale.getPixelForValue(pts[i].x), yScale.getPixelForValue(pts[i].y1));
            }
            for (let i = pts.length - 1; i >= 0; i--) {
                ctx.lineTo(xScale.getPixelForValue(pts[i].x), yScale.getPixelForValue(pts[i].y2));
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fill();
        }

        // Draw dotted lines from intersection points down to y=0
        if (currentRoots.length > 0) {
            ctx.save();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(0,0,0,0.35)';
            ctx.lineWidth = 1;

            const yZeroPx = yScale.getPixelForValue(0);

            for (const r of currentRoots) {
                const xPx = xScale.getPixelForValue(r.x);
                const yPx = yScale.getPixelForValue(r.y);

                // Dotted line from intersection to y=0
                ctx.beginPath();
                ctx.moveTo(xPx, yPx);
                ctx.lineTo(xPx, yZeroPx);
                ctx.stroke();

                // Small circle at intersection
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(xPx, yPx, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Tick mark on x-axis at intersection x
                ctx.setLineDash([]);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(xPx, yZeroPx - 5);
                ctx.lineTo(xPx, yZeroPx + 5);
                ctx.stroke();

                // Label with x value
                ctx.fillStyle = '#000';
                ctx.font = '11px Lora, serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(r.x.toFixed(4), xPx, yZeroPx + 7);

                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth = 1;
            }

            ctx.setLineDash([]);
            ctx.restore();
        }
        ctx.restore();
    }
};

function plotCurves(expr1, expr2) {
    const ctx = document.getElementById('functionChart').getContext('2d');
    const steps = 500;
    const pts1 = evaluatePoints(expr1, -10, 10, steps);
    const pts2 = evaluatePoints(expr2, -10, 10, steps);

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                {
                    label: `f(x) = ${expr1}`,
                    data: pts1,
                    showLine: true,
                    borderColor: '#000',
                    pointRadius: 0,
                    fill: false,
                    borderWidth: 2.5
                },
                {
                    label: `g(x) = ${expr2}`,
                    data: pts2,
                    showLine: true,
                    borderColor: '#555',
                    pointRadius: 0,
                    fill: false,
                    borderWidth: 2.5
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 16 / 9,
            scales: {
                x: {
                    type: 'linear',
                    title: { display: true, text: 'x', align: 'end' },
                    grid: { color: 'rgba(0,0,0,0.1)' },
                    min: -zoomRange,
                    max: zoomRange,
                    position: 'center'
                },
                y: {
                    title: { display: false },
                    grid: { color: 'rgba(0,0,0,0.1)' },
                    min: -zoomRange,
                    max: zoomRange,
                    position: 'center'
                }
            },
            plugins: {
                legend: {
                    labels: {
                        font: { family: 'Lora' },
                        usePointStyle: true,
                        pointStyle: 'line'
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return `(${parseFloat(context.parsed.x.toFixed(4))}, ${parseFloat(context.parsed.y.toFixed(4))})`;
                        }
                    }
                }
            }
        },
        plugins: [fillPlugin]
    });
}

function applyZoom() {
    if (!chartInstance) return;
    const opts = chartInstance.options;
    opts.scales.x.min = -zoomRange;
    opts.scales.x.max = zoomRange;
    opts.scales.y.min = -zoomRange;
    opts.scales.y.max = zoomRange;
    chartInstance.update();
}

document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomRange = Math.max(zoomRange * 0.7, 0.5);
    applyZoom();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomRange = Math.min(zoomRange / 0.7, 50);
    applyZoom();
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
    zoomRange = defaultZoomRange;
    applyZoom();
});

function runCalculation() {
    const expr1 = document.getElementById('func1').value.trim();
    const expr2 = document.getElementById('func2').value.trim();

    if (!expr1 || !expr2) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Please enter both function expressions.</span>';
        document.getElementById('intersections').innerHTML = '';
        document.getElementById('segments').innerHTML = '';
        return;
    }

    try { math.compile(expr1).evaluate({x: 0}); }
    catch(e) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Invalid expression for f(x): ' + e.message + '</span>';
        document.getElementById('intersections').innerHTML = '';
        document.getElementById('segments').innerHTML = '';
        return;
    }

    try { math.compile(expr2).evaluate({x: 0}); }
    catch(e) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Invalid expression for g(x): ' + e.message + '</span>';
        document.getElementById('intersections').innerHTML = '';
        document.getElementById('segments').innerHTML = '';
        return;
    }

    // Find intersections in [-10, 10]
    const roots = findIntersections(expr1, expr2, -10, 10);

    // Store roots with y-values for markers, using f(x)
    const f1 = math.compile(expr1);
    currentRoots = roots.map(x => ({ x, y: f1.evaluate({x}) }));

    // Build bounds: only the roots (area strictly between clashing points)
    const allBounds = roots.filter((v, i, a) => a.indexOf(v) === i).sort((a, b) => a - b);

    // Segments between consecutive bounds
    const segments = [];
    const fTop = math.compile(expr1);
    const gTop = math.compile(expr2);
    for (let i = 0; i < allBounds.length - 1; i++) {
        const a = allBounds[i];
        const b = allBounds[i + 1];
        if (Math.abs(b - a) < 1e-10) continue;
        const area = calculateArea(expr1, expr2, a, b);
        // Determine which function is on top at the midpoint
        const mid = (a + b) / 2;
        const fVal = fTop.evaluate({x: mid});
        const gVal = gTop.evaluate({x: mid});
        const top = fVal >= gVal ? 'f(x)' : 'g(x)';
        const bot = fVal >= gVal ? 'g(x)' : 'f(x)';
        segments.push({ from: a, to: b, area, top, bot });
    }

    currentSegments = segments;

    if (segments.length === 0) {
        document.getElementById('intersections').innerHTML =
            '<em>Curves do not intersect in [-10, 10]</em>';
        document.getElementById('segments').innerHTML = '';
        document.getElementById('result').innerHTML =
            '<span style="color:#c00;">No area to compute — curves do not cross.</span>';
        plotCurves(expr1, expr2);
        return;
    }

    // Display intersections
    const intStr = roots.map(r => 'x = ' + r.toFixed(4)).join(', ');
    document.getElementById('intersections').innerHTML =
        'Intersection points: <strong>' + intStr + '</strong>';

    // Convert user expression to LaTeX
    function exprToLatex(expr) {
        let s = expr;
        s = s.replace(/\^/g, '^');
        s = s.replace(/sin\(/g, '\\sin(');
        s = s.replace(/cos\(/g, '\\cos(');
        s = s.replace(/tan\(/g, '\\tan(');
        s = s.replace(/asin\(/g, '\\sin^{-1}(');
        s = s.replace(/acos\(/g, '\\cos^{-1}(');
        s = s.replace(/atan\(/g, '\\tan^{-1}(');
        s = s.replace(/log10\(/g, '\\log_{10}(');
        s = s.replace(/ln\(/g, '\\ln(');
        s = s.replace(/log\(/g, '\\ln(');
        s = s.replace(/sqrt\(/g, '\\sqrt{');
        s = s.replace(/abs\(/g, '\\left|');
        s = s.replace(/exp\(/g, 'e^{');
        s = s.replace(/\bpi\b/gi, '\\pi ');
        s = s.replace(/\*/g, '');
        // Close any unmatched braces for sqrt/abs/exp - match open-parens/brackets
        let openParen = (s.match(/\(/g) || []).length;
        let closeParen = (s.match(/\)/g) || []).length;
        let openBrace = (s.match(/\{/g) || []).length;
        let closeBrace = (s.match(/\}/g) || []).length;
        while (openParen > closeParen) { s += ')'; closeParen++; }
        while (openBrace > closeBrace) { s += '}'; closeBrace++; }
        return s;
    }

    // Display segment areas in a table with KaTeX
    let totalArea = 0;
    let stepsHtml = '<div style="margin-top:10px; font-size:1.1rem;">';
    stepsHtml += '<table class="table table-bordered table-dark" style="margin-bottom:10px;">';
    stepsHtml += '<thead><tr><th>Interval</th><th>Integral</th><th>Area</th></tr></thead><tbody>';

    segments.forEach((seg, idx) => {
        totalArea += seg.area;
        const fromStr = seg.from.toFixed(4);
        const toStr = seg.to.toFixed(4);
        const areaStr = seg.area.toFixed(6);
        const topExpr = seg.top === 'f(x)' ? expr1 : expr2;
        const botExpr = seg.bot === 'f(x)' ? expr1 : expr2;

        if (typeof katex !== 'undefined') {
            const intervalLatex = fromStr + ' \\leq x \\leq ' + toStr;
            const topLatex = exprToLatex(topExpr);
            const botLatex = exprToLatex(botExpr);
            const integralLatex = '\\displaystyle \\int_{' + fromStr + '}^{' + toStr + '} \\left(' + topLatex + ' - ' + botLatex + '\\right) \\, dx';

            stepsHtml += '<tr><td>' + katex.renderToString(intervalLatex, { displayMode: false }) + '</td>';
            stepsHtml += '<td>' + katex.renderToString(integralLatex, { displayMode: false }) + '</td>';
            stepsHtml += '<td><strong>' + areaStr + '</strong></td></tr>';
        } else {
            stepsHtml += '<tr><td>[' + fromStr + ', ' + toStr + ']</td>';
            stepsHtml += '<td>\u222B(' + fromStr + ',' + toStr + ')</td>';
            stepsHtml += '<td><strong>' + areaStr + '</strong></td></tr>';
        }
    });

    stepsHtml += '</tbody></table></div>';

    document.getElementById('segments').innerHTML = stepsHtml;
    document.getElementById('result').innerHTML =
        'Total area between curves = <strong>' + totalArea.toFixed(6) + '</strong> square units';

    plotCurves(expr1, expr2);
}

// Auto-update on input change with debounce
let debounceTimer;
function debouncedCalculate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runCalculation, 400);
}

document.getElementById('func1').addEventListener('input', debouncedCalculate);
document.getElementById('func2').addEventListener('input', debouncedCalculate);

// Initial plot
runCalculation();
</script>

</body>
</html>

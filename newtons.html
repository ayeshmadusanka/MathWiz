<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton-Raphson Iteration Table</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.0.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: #000;
            padding: 20px;
        }
        h1 {
            color: #000;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-label {
            color: #000;
        }
        .form-control {
            background-color: #f5f5ef;
            color: #000;
            border: 1px solid black;
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-success {
            background-color: #000;
            border-color: #000;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .table-container {
            margin-top: 30px;
            display: none;
        }
        .table-dark {
            background-color: #f5f5ef;
            color: #000;
        }
        .table-dark th {
            background-color: #f5f5ef;
        }
        .table-dark tbody tr:hover {
            background-color: #e8e8d8;
            color: black !important;
            font-weight: bold !important;
        }
        .table-bordered, .table-bordered th, .table-bordered td {
            border: 2px solid black !important;
        }
        .zoom-btn {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-container {
            position: relative;
            margin-top: 40px;
            display: none;
        }
    </style>
</head>
<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<h1>Newton-Raphson Iteration Table</h1>

<div class="container">
    <!-- Form for user inputs -->
    <form id="newtonForm" class="form-row">
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="function" class="form-label">Enter f(x):</label>
            <input type="text" id="function" class="form-control" placeholder="f(x)" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="initial_guess" class="form-label">Initial Guess (x₀):</label>
            <input type="number" id="initial_guess" class="form-control" step="any" value="2" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="iterations" class="form-label">Number of Iterations:</label>
            <input type="number" id="iterations" class="form-control" value="10" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3 d-flex align-items-end">
            <input type="submit" class="btn btn-success btn-block" value="Calculate">
        </div>
    </form>

    <div class="chart-container">
        <div style="position:absolute;top:-10px;right:8px;z-index:10;display:flex;gap:4px;">
            <button class="btn btn-success btn-sm zoom-btn" id="zoomInBtn">&#43;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomOutBtn">&minus;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomResetBtn">&#8634;</button>
        </div>
        <canvas id="functionChart"></canvas>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table id="resultTable" class="table table-dark table-striped table-hover table-bordered">
                <thead>
                    <tr>
                        <th>Iteration</th>
                        <th>x_new</th>
                        <th>f(x)</th>
                        <th>Error</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Results will be dynamically added here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.getElementById('newtonForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Get user inputs
    const userFunction = document.getElementById('function').value;
    let xOld = parseFloat(document.getElementById('initial_guess').value);
    const numberIterations = parseInt(document.getElementById('iterations').value);

    // Tolerance for root detection
    const tolerance = 1e-8;

    // Function to evaluate the user-provided function
    const f = math.compile(userFunction);

    // Function to compute the numerical derivative using central difference
    function derivative(x) {
        const h = 1e-5;  // Small step for numerical differentiation
        return (f.evaluate({x: x + h}) - f.evaluate({x: x - h})) / (2 * h);
    }

    // Table body element for results
    const tbody = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';  // Clear previous results
    document.querySelector('.table-container').style.display = 'block';

    let previousX = xOld;
    let rootFound = false;
    const iterPoints = [{x: xOld, y: f.evaluate({x: xOld})}];

    // Iterate using Newton-Raphson method
    for (let i = 1; i <= numberIterations; i++) {
        const fValue = f.evaluate({x: xOld});
        const derivativeValue = derivative(xOld);

        if (Math.abs(derivativeValue) < tolerance) {
            // Derivative is zero or close to zero, stop iteration
            const row = tbody.insertRow();
            row.insertCell(0).innerText = i;
            row.insertCell(1).innerText = '---';
            row.insertCell(2).innerText = 'Derivative is zero';
            row.insertCell(3).innerText = '---';
            break;
        }

        const xNew = xOld - fValue / derivativeValue;
        const error = Math.abs(xNew - previousX);

        // Insert a new row into the table
        const row = tbody.insertRow();
        row.insertCell(0).innerText = i;
        row.insertCell(1).innerText = xNew.toFixed(8);
        row.insertCell(2).innerText = fValue.toFixed(8);
        row.insertCell(3).innerText = error.toFixed(8);

        iterPoints.push({x: xNew, y: f.evaluate({x: xNew})});

        // Check if the function value is close enough to zero
        if (Math.abs(fValue) < tolerance) {
            rootFound = true;
            const row = tbody.insertRow();
            row.insertCell(0).colSpan = 4;
            row.insertCell(0).innerText = 'Root found at x = ' + xNew.toFixed(8);
            break;
        }

        // Update xOld for the next iteration
        previousX = xOld;
        xOld = xNew;
    }

    if (!rootFound && numberIterations > 0) {
        const row = tbody.insertRow();
        row.insertCell(0).colSpan = 4;
        row.insertCell(0).innerText = 'Root not found within the given number of iterations.';
    }

    plotFunction(userFunction, iterPoints, rootFound, xOld);
});

document.getElementById('function').addEventListener('input', function() {
    const funcStr = this.value;
    if (funcStr.trim()) {
        try {
            math.compile(funcStr);
            plotFunction(funcStr, [], false, null);
        } catch(e) {}
    }
});

let chartInstance = null;
let zoomRange = 10;
let defaultZoomRange = 10;
let currentFuncStr = '';
let panOffsetX = 0;
let panOffsetY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;

function evaluatePoints(expr, xMin, xMax, steps) {
    const f = math.compile(expr);
    const points = [];
    const step = (xMax - xMin) / steps;
    for (let x = xMin; x <= xMax + step / 2; x += step) {
        try {
            const y = f.evaluate({x});
            if (isFinite(y)) points.push({x, y});
        } catch(e) {}
    }
    return points;
}

function plotFunction(funcStr, iterPoints, rootFound, finalX) {
    const ctx = document.getElementById('functionChart').getContext('2d');
    const container = document.querySelector('.chart-container');
    container.style.display = 'block';

    const rootX = rootFound ? finalX : null;
    currentFuncStr = funcStr;
    const f = math.compile(funcStr);

    let range = 10;
    if (rootX !== null || (iterPoints && iterPoints.length > 0)) {
        const allXs = iterPoints.map(p => p.x);
        if (rootX !== null) allXs.push(rootX);
        const maxAbs = Math.max(...allXs.map(Math.abs), 1);
        range = Math.max(10, Math.ceil(maxAbs * 1.5));
    }
    zoomRange = range;
    panOffsetX = 0;
    panOffsetY = 0;
    defaultZoomRange = range;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    const curvePoints = evaluatePoints(currentFuncStr, viewMin, viewMax, 200);

    if (chartInstance) chartInstance.destroy();

    const linesPlugin = {
        id: 'linesPlugin',
        afterDraw(chart) {
            const ctx = chart.ctx;
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;
            if (!xScale || !yScale) return;
            ctx.save();
            const x0 = xScale.getPixelForValue(0);
            const y0 = yScale.getPixelForValue(0);
            const ca = chart.chartArea;
            ctx.beginPath();
            ctx.setLineDash([]);
            ctx.strokeStyle = 'rgba(0,0,0,0.45)';
            ctx.lineWidth = 1;
            if (isFinite(y0)) { ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0); }
            if (isFinite(x0)) { ctx.moveTo(x0, ca.top); ctx.lineTo(x0, ca.bottom); }
            ctx.stroke();
            ctx.font = '14px Lora';
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('f(x)', (ca.left + ca.right) / 2, ca.top - 4);
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            ctx.fillText('x', ca.right + 6, (ca.top + ca.bottom) / 2);
            ctx.font = '11px Lora';
            ctx.fillStyle = '#000';
            if (isFinite(y0)) {
                const r = xScale.max - xScale.min;
                const lo = Math.ceil(xScale.min);
                const hi = Math.floor(xScale.max);
                const cnt = hi - lo + 1;
                let step, first;
                if (cnt >= 3 && cnt <= 40) {
                    step = 1; first = lo;
                } else {
                    const raw = r / 10;
                    const mag = Math.pow(10, Math.floor(Math.log10(Math.max(raw, 1e-15))));
                    const norm = raw / mag;
                    step = norm <= 1.5 ? mag : norm <= 3.5 ? 2 * mag : norm <= 7.5 ? 5 * mag : 10 * mag;
                    first = Math.ceil(xScale.min / step) * step;
                }
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                for (let v = first; v <= xScale.max; v += step) {
                    if (Math.abs(v) < 1e-10) continue;
                    const px = xScale.getPixelForValue(v);
                    if (px >= ca.left && px <= ca.right) {
                        ctx.fillText(Number.isInteger(v) ? v.toString() : v.toFixed(2), px, y0 + 3);
                    }
                }
            }
            if (isFinite(x0)) {
                const r = yScale.max - yScale.min;
                const lo = Math.ceil(yScale.min);
                const hi = Math.floor(yScale.max);
                const cnt = hi - lo + 1;
                let step, first;
                if (cnt >= 3 && cnt <= 40) {
                    step = 1; first = lo;
                } else {
                    const raw = r / 10;
                    const mag = Math.pow(10, Math.floor(Math.log10(Math.max(raw, 1e-15))));
                    const norm = raw / mag;
                    step = norm <= 1.5 ? mag : norm <= 3.5 ? 2 * mag : norm <= 7.5 ? 5 * mag : 10 * mag;
                    first = Math.ceil(yScale.min / step) * step;
                }
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                for (let v = first; v <= yScale.max; v += step) {
                    if (Math.abs(v) < 1e-10) continue;
                    const py = yScale.getPixelForValue(v);
                    if (py >= ca.top && py <= ca.bottom) {
                        ctx.fillText(Number.isInteger(v) ? v.toString() : v.toFixed(2), x0 - 4, py);
                    }
                }
            }
            if (!iterPoints || iterPoints.length === 0) { ctx.restore(); return; }
            const h = 1e-5;
            for (const dp of iterPoints) {
                if (!dp || !isFinite(dp.x) || !isFinite(dp.y)) continue;
                const px = xScale.getPixelForValue(dp.x);
                const py = yScale.getPixelForValue(dp.y);
                const py0 = yScale.getPixelForValue(0);
                if (!isFinite(px) || !isFinite(py) || !isFinite(py0)) continue;
                ctx.beginPath();
                ctx.setLineDash([6, 4]);
                ctx.moveTo(px, py);
                ctx.lineTo(px, py0);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                try {
                    const slope = (f.evaluate({x: dp.x + h}) - f.evaluate({x: dp.x - h})) / (2 * h);
                    if (isFinite(slope)) {
                        const span = zoomRange / 2.5;
                        const x1 = dp.x - span;
                        const x2 = dp.x + span;
                        const y1 = dp.y + slope * (x1 - dp.x);
                        const y2 = dp.y + slope * (x2 - dp.x);
                        const p1x = xScale.getPixelForValue(x1);
                        const p1y = yScale.getPixelForValue(y1);
                        const p2x = xScale.getPixelForValue(x2);
                        const p2y = yScale.getPixelForValue(y2);
                        if (!isFinite(p1x) || !isFinite(p1y) || !isFinite(p2x) || !isFinite(p2y)) continue;
                        ctx.beginPath();
                        ctx.setLineDash([]);
                        ctx.moveTo(p1x, p1y);
                        ctx.lineTo(p2x, p2y);
                        ctx.strokeStyle = 'rgba(200,50,50,0.7)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                } catch(e) {}
            }
            ctx.setLineDash([]);
            ctx.restore();
        }
    };
    Chart.register(linesPlugin);

    const datasets = [{
        label: `f(x) = ${funcStr}`,
        data: curvePoints,
        borderColor: 'black',
        backgroundColor: 'black',
        pointRadius: 0,
        showLine: true,
        tension: 0.3,
        borderWidth: 2,
        fill: false
    }];

    if (iterPoints && iterPoints.length > 0) {
        datasets.push({
            label: 'Iteration points',
            data: iterPoints,
            borderColor: '#555',
            backgroundColor: '#555',
            pointRadius: 6,
            pointStyle: 'circle',
            showLine: false
        });


    }

    if (rootX !== null) {
        datasets.push({
            label: `Root: x = ${rootX.toFixed(6)}`,
            data: [{x: rootX, y: 0}],
            borderColor: 'black',
            backgroundColor: 'black',
            pointRadius: 8,
            pointStyle: 'cross',
            borderWidth: 3,
            showLine: false
        });
    }



    try {
        chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {datasets},
            options: {
                aspectRatio: 16/9,
                maintainAspectRatio: true,
                layout: {
                    padding: {
                        right: 20
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        grid: {color: 'rgba(0,0,0,0.1)'},
                        ticks: {display: false},
                        border: {display: false},
                        min: viewMin,
                        max: viewMax
                    },
                    y: {
                        grid: {color: 'rgba(0,0,0,0.1)'},
                        ticks: {display: false},
                        border: {display: false},
                        min: -zoomRange + panOffsetY,
                        max: zoomRange + panOffsetY
                    }
                },
                plugins: {
                    legend: {
                        align: 'start',
                        labels: {
                            font: {family: 'Lora'}
                        },
                        padding: {
                            left: 20
                        }
                    }
                }
            }
        });
    } catch(e) {
        console.error('Chart error:', e);
    }
}

function applyZoom() {
    if (!chartInstance) return;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    if (currentFuncStr) {
        chartInstance.data.datasets[0].data = evaluatePoints(currentFuncStr, viewMin, viewMax, 200);
    }
    chartInstance.options.scales.x.min = viewMin;
    chartInstance.options.scales.x.max = viewMax;
    chartInstance.options.scales.y.min = -zoomRange + panOffsetY;
    chartInstance.options.scales.y.max = zoomRange + panOffsetY;
    chartInstance.update();
}

document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomRange = Math.max(zoomRange * 0.7, 0.5);
    applyZoom();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomRange = Math.min(zoomRange / 0.7, 50);
    applyZoom();
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
    zoomRange = defaultZoomRange;
    panOffsetX = 0;
    panOffsetY = 0;
    applyZoom();
});

const canvas = document.getElementById('functionChart');
canvas.style.cursor = 'crosshair';
canvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    canvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', function(e) {
    if (!isDragging || !chartInstance) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const xScale = chartInstance.scales.x;
    const yScale = chartInstance.scales.y;
    if (xScale && yScale) {
        const pxPerUnitX = xScale.getPixelForValue(1) - xScale.getPixelForValue(0);
        const pxPerUnitY = yScale.getPixelForValue(1) - yScale.getPixelForValue(0);
        panOffsetX -= dx / pxPerUnitX;
        panOffsetY += dy / pxPerUnitY;
    }
    applyZoom();
});
document.addEventListener('mouseup', function() {
    if (isDragging) {
        isDragging = false;
        canvas.style.cursor = 'crosshair';
    }
});
</script>



</body>
</html>

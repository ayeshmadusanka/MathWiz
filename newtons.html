<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton-Raphson Iteration Table</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.0.0/math.min.js"></script>
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: #000;
            padding: 20px;
        }
        h1 {
            color: #000;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-label {
            color: #000;
        }
        .form-control {
            background-color: #f5f5ef;
            color: #000;
            border: 1px solid #ccc;
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-success {
            background-color: #000;
            border-color: #000;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .table-container {
            margin-top: 30px;
        }
        .table-dark {
            background-color: #f5f5ef;
            color: #000;
        }
        .table-dark th {
            background-color: #f5f5ef;
        }
        .table-dark tbody tr:hover {
            background-color: #e8e8d8;
        }
    </style>
</head>
<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<h1>Newton-Raphson Iteration Table</h1>

<div class="container">
    <!-- Form for user inputs -->
    <form id="newtonForm" class="form-row">
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="function" class="form-label">Enter f(x):</label>
            <input type="text" id="function" class="form-control" placeholder="f(x)" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="initial_guess" class="form-label">Initial Guess (x₀):</label>
            <input type="number" id="initial_guess" class="form-control" step="any" value="2" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3">
            <label for="iterations" class="form-label">Number of Iterations:</label>
            <input type="number" id="iterations" class="form-control" value="10" required>
        </div>
        <div class="form-group col-12 col-md-6 col-lg-3 d-flex align-items-end">
            <input type="submit" class="btn btn-success btn-block" value="Calculate">
        </div>
    </form>

    <div class="table-container">
        <div class="table-responsive">
            <table id="resultTable" class="table table-dark table-striped table-hover table-bordered">
                <thead>
                    <tr>
                        <th>Iteration</th>
                        <th>x_new</th>
                        <th>f(x)</th>
                        <th>Error</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Results will be dynamically added here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.getElementById('newtonForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Get user inputs
    const userFunction = document.getElementById('function').value;
    let xOld = parseFloat(document.getElementById('initial_guess').value);
    const numberIterations = parseInt(document.getElementById('iterations').value);

    // Tolerance for root detection
    const tolerance = 1e-8;

    // Function to evaluate the user-provided function
    const f = math.compile(userFunction);

    // Function to compute the numerical derivative using central difference
    function derivative(x) {
        const h = 1e-5;  // Small step for numerical differentiation
        return (f.evaluate({x: x + h}) - f.evaluate({x: x - h})) / (2 * h);
    }

    // Table body element for results
    const tbody = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
    tbody.innerHTML = '';  // Clear previous results

    let previousX = xOld;
    let rootFound = false;

    // Iterate using Newton-Raphson method
    for (let i = 1; i <= numberIterations; i++) {
        const fValue = f.evaluate({x: xOld});
        const derivativeValue = derivative(xOld);

        if (Math.abs(derivativeValue) < tolerance) {
            // Derivative is zero or close to zero, stop iteration
            const row = tbody.insertRow();
            row.insertCell(0).innerText = i;
            row.insertCell(1).innerText = '---';
            row.insertCell(2).innerText = 'Derivative is zero';
            row.insertCell(3).innerText = '---';
            break;
        }

        const xNew = xOld - fValue / derivativeValue;
        const error = Math.abs(xNew - previousX);

        // Insert a new row into the table
        const row = tbody.insertRow();
        row.insertCell(0).innerText = i;
        row.insertCell(1).innerText = xNew.toFixed(8);
        row.insertCell(2).innerText = fValue.toFixed(8);
        row.insertCell(3).innerText = error.toFixed(8);

        // Check if the function value is close enough to zero
        if (Math.abs(fValue) < tolerance) {
            rootFound = true;
            const row = tbody.insertRow();
            row.insertCell(0).colSpan = 4;
            row.insertCell(0).innerText = 'Root found at x = ' + xNew.toFixed(8);
            break;
        }

        // Update xOld for the next iteration
        previousX = xOld;
        xOld = xNew;
    }

    if (!rootFound && numberIterations > 0) {
        const row = tbody.insertRow();
        row.insertCell(0).colSpan = 4;
        row.insertCell(0).innerText = 'Root not found within the given number of iterations.';
    }
});
</script>



</body>
</html>

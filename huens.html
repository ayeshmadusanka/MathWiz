<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heun's Method Table</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: black;
            padding: 20px;
        }
        h1 {
            color: black;
        }
        .table-container {
            margin-top: 20px;
        }
        .table-hover tbody tr:hover {
            background-color: #e8e8dc;
        }
        .form-control, .form-label {
            margin-bottom: 15px;
        }
        .form-control {
            background-color: #f5f5ef;
            color: black;
            border: 1px solid #ccc;
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-success {
            background-color: black;
            border-color: black;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .table-dark th, .table-dark td {
            background-color: #f5f5ef;
            color: black;
        }
        .table-dark tbody tr {
            background-color: #f5f5ef;
        }
        .table-dark tbody tr:hover {
            background-color: #e8e8dc;
        }
        .table-dark thead th {
            background-color: #e8e8dc;
        }
    </style>
</head>
<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<div class="container">
    <h1 class="text-center mb-4">Heun's Method Table</h1>

    <!-- Form for user inputs -->
    <form id="heunsForm" class="row g-3">
        <div class="col-12 col-md-6 col-lg-3">
            <label for="y0" class="form-label">Initial y (y₀):</label>
            <input type="number" id="y0" name="y0" class="form-control" step="any" value="1" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="h" class="form-label">Step Size (h):</label>
            <input type="number" id="h" name="h" class="form-control" step="any" value="0.1" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="function" class="form-label">Function f(x, y):</label>
            <input type="text" id="function" name="function" class="form-control" value="x + y" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="iterations" class="form-label">Number of Iterations:</label>
            <input type="number" id="iterations" name="iterations" class="form-control" value="10" required>
        </div>
        <div class="col-12 text-center">
            <input type="submit" class="btn btn-success mt-2" value="Calculate">
        </div>
    </form>

    <div class="table-container">
        <div class="table-responsive">
            <table id="heunsTable" class="table table-hover table-dark table-bordered mt-4">
                <thead>
                    <tr>
                        <th>Iteration</th>
                        <th>x</th>
                        <th>k1</th>
                        <th>k2</th>
                        <th>y</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Table rows will be added here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS and dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('heunsForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const y0 = parseFloat(document.getElementById('y0').value);
        const h = parseFloat(document.getElementById('h').value);
        const func = document.getElementById('function').value;
        const iterations = parseInt(document.getElementById('iterations').value);

        function evaluateFunction(x, y, func) {
            // Create a safe function context
            const safeFunc = new Function('x', 'y', `
                return ${func
                    .replace(/exp/g, 'Math.exp')
                    .replace(/sqrt/g, 'Math.sqrt')
                    .replace(/log/g, 'Math.log')
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/tan/g, 'Math.tan')
                    .replace(/\^/g, '**')
                };
            `);
            try {
                return safeFunc(x, y);
            } catch (e) {
                console.error("Error in function evaluation:", e);
                return NaN;
            }
        }

        const x0 = 0;
        const tableBody = document.querySelector('#heunsTable tbody');
        tableBody.innerHTML = ''; // Clear previous results

        let x = [];
        let y = [];
        
        for (let i = 0; i < iterations; i++) {
            x[i] = x0 + i * h;
            y[i] = (i === 0) ? y0 : 0;
        }

        for (let i = 0; i < iterations; i++) {
            const k1 = evaluateFunction(x[i], y[i], func);
            const y_pred = y[i] + h * k1; // Predict y using Euler's method
            const k2 = evaluateFunction(x[i] + h, y_pred, func);
            
            y[i + 1] = y[i] + (h / 2) * (k1 + k2); // Correct y
            
            const row = `<tr>
                <td>${i + 1}</td>
                <td>${x[i].toFixed(4)}</td>
                <td>${k1.toFixed(4)}</td>
                <td>${k2.toFixed(4)}</td>
                <td>${y[i + 1].toFixed(4)}</td>
            </tr>`;
            tableBody.insertAdjacentHTML('beforeend', row);
        }
    });
</script>



</body>
</html>

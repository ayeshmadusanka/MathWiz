<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<div class="container">
    <div class="section">
        <h1 class="text-center">Mann-Whitney U Test</h1>
    </div>

    <div class="section">
        <h2>Input Your Data</h2>
        <p>Enter your sample data:</p>
        <div id="mannWhitneyError" class="alert alert-danger d-none" role="alert"></div>
        <div class="mb-3">
            <label for="firstSampleDataMannWhitney" class="form-label">Sample 1 (comma separated):</label>
            <input type="text" class="form-control" id="firstSampleDataMannWhitney" placeholder="e.g. 5, 6, 7">
        </div>
        <div class="mb-3">
            <label for="secondSampleDataMannWhitney" class="form-label">Sample 2 (comma separated):</label>
            <input type="text" class="form-control" id="secondSampleDataMannWhitney" placeholder="e.g. 6, 5, 8">
        </div>
        <button type="button" class="btn btn-success" id="calculateMannWhitney">Calculate</button>
        <div id="mannWhitneyLoading" class="d-none text-center mt-3">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <div id="mannWhitneyResults" class="mt-3"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function parseInputData(input) {
        return input.split(',').map(num => parseFloat(num.trim())).filter(num => !isNaN(num));
    }

    function showError(containerId, message) {
        const errorDiv = document.getElementById(containerId);
        errorDiv.textContent = message;
        errorDiv.classList.remove('d-none');
    }

    function hideError(containerId) {
        const errorDiv = document.getElementById(containerId);
        errorDiv.classList.add('d-none');
        errorDiv.textContent = '';
    }

    // Mann-Whitney U Test Function
    function performMannWhitneyTest(sample1, sample2) {
        const combined = [...sample1, ...sample2];
        const ranks = [];
        const n1 = sample1.length;
        const n2 = sample2.length;

        // Sort combined array while preserving the original indices
        const sortedCombined = combined.map((value, index) => ({ value, index })).sort((a, b) => a.value - b.value);

        let i = 0;
        while (i < sortedCombined.length) {
            const start = i;
            const currentValue = sortedCombined[i].value;

            // Find the end of the tie
            while (i < sortedCombined.length && sortedCombined[i].value === currentValue) {
                i++;
            }

            const end = i; // The end of the tie group
            const averageRank = (start + end + 1) / 2; // Average rank for tied values

            // Assign average rank to all tied values
            for (let j = start; j < end; j++) {
                const originalIndex = sortedCombined[j].index;
                ranks[originalIndex] = averageRank; // Assign the average rank
            }
        }

        const U1 = ranks.slice(0, n1).reduce((sum, rank) => sum + rank, 0) - (n1 * (n1 + 1) / 2);
        const U2 = n1 * n2 - U1;

        return { U1, U2, ranks };
    }

    document.getElementById('calculateMannWhitney').addEventListener('click', function() {
        hideError('mannWhitneyError');

        const sample1Input = document.getElementById('firstSampleDataMannWhitney').value;
        const sample2Input = document.getElementById('secondSampleDataMannWhitney').value;

        const sample1 = parseInputData(sample1Input);
        const sample2 = parseInputData(sample2Input);

        if (sample1.length === 0 || sample2.length === 0) {
            showError('mannWhitneyError', 'Both samples cannot be empty.');
            return;
        }

        document.getElementById('mannWhitneyLoading').classList.remove('d-none');

        setTimeout(() => {
            const { U1, U2, ranks } = performMannWhitneyTest(sample1, sample2);
            const resultsDiv = document.getElementById('mannWhitneyResults');
            const rankTable = generateRankTable(sample1, sample2, ranks);

            resultsDiv.innerHTML = `
                <h3>Results:</h3>
                <p>U<sub>1</sub>: ${U1}</p>
                <p>U<sub>2</sub>: ${U2}</p>
                <h3>Ranked Data:</h3>
                ${rankTable}
            `;
            document.getElementById('mannWhitneyLoading').classList.add('d-none');
        }, 1000);
    });

    function generateRankTable(sample1, sample2, ranks) {
        let tableHtml = `<table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Sample 1</th>
                                    <th>Rank</th>
                                    <th>Sample 2</th>
                                    <th>Rank</th>
                                </tr>
                            </thead>
                            <tbody>`;

        const n1 = sample1.length;
        const n2 = sample2.length;
        const ranksSample1 = ranks.slice(0, n1);
        const ranksSample2 = ranks.slice(n1);

        for (let i = 0; i < Math.max(n1, n2); i++) {
            tableHtml += `<tr>
                            <td>${i < n1 ? sample1[i] : ''}</td>
                            <td>${i < n1 ? ranksSample1[i] : ''}</td>
                            <td>${i < n2 ? sample2[i] : ''}</td>
                            <td>${i < n2 ? ranksSample2[i] : ''}</td>
                          </tr>`;
        }

        tableHtml += `</tbody></table>`;
        return tableHtml;
    }
</script>


</body>
</html>

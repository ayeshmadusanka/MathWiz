<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Calculator</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.0.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: #000;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #000;
        }
        .form-control {
            background-color: #f5f5ef;
            color: #000;
            border: 1px solid black;
        }
        .form-control:focus {
            background-color: #f5f5ef;
            border-color: #000;
            box-shadow: none;
        }
        .btn-success {
            background-color: #000;
            border-color: #000;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .result-box {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #000;
        }
        .result-box table {
            width: 100%;
            color: #000;
        }
        .result-box table th {
            background-color: #f5f5ef;
            color: #000;
            border: 2px solid black !important;
            text-align: center;
            font-weight: bold;
        }
        .result-box table td {
            background-color: #f5f5ef;
            color: #000;
            border: 2px solid black !important;
            text-align: center;
            vertical-align: middle;
            font-size: 1.3rem;
        }
        .result-box .katex { font-size: 1.1em; }
        .chart-container {
            position: relative;
            margin-top: 20px;
        }
        .zoom-btn {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-secondary {
            background-color: #555;
            border-color: #555;
        }
        .btn-secondary:hover {
            background-color: #333;
            border-color: #333;
        }
    </style>
</head>
<body>

<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>

<div class="container">
    <h1>Integration Calculator</h1>

    <div class="form-row">
        <div class="form-group col-md-8 offset-md-2" style="display:flex; align-items:center; gap:10px;">
            <label style="margin-bottom:0; white-space:nowrap; font-weight:600; font-size:1.2rem;">f(x) =</label>
            <input type="text" id="funcInput" class="form-control" value="x^3 - 3*x" placeholder="e.g. x^2, sin(x), e^x, x^2 + 3*x + 1">
            <input type="text" id="lowerLimit" class="form-control" placeholder="a" style="width:70px; text-align:center;">
            <input type="text" id="upperLimit" class="form-control" placeholder="b" style="width:70px; text-align:center;">
            <button class="btn btn-success" id="calcBtn" style="white-space:nowrap;">Calculate</button>
        </div>
    </div>

    <div class="chart-container" id="chartContainer" style="display:none;">
        <div style="position:absolute; top:-14px; right:8px; z-index:10; display:flex; gap:4px;">
            <button class="btn btn-success btn-sm zoom-btn" id="zoomInBtn">&#43;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomOutBtn">&minus;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomResetBtn">&#8634;</button>
        </div>
        <canvas id="functionChart"></canvas>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
function fixInput(s) {
    s = s.replace(/\s+/g, '');
    s = s.replace(/\)\(/g, ')*(');
    s = s.replace(/(\d)(\()/g, '$1*$2');
    s = s.replace(/(\))(\d)/g, '$1*$2');
    s = s.replace(/(\d)(x)/g, '$1*$2');
    s = s.replace(/(\d)(pi)/g, '$1*$2');
    s = s.replace(/(x)(\()/g, '$1*$2');
    s = s.replace(/(x)(x)/g, '$1*$2');
    s = s.replace(/(x)(sin|cos|tan|log|ln|sqrt|abs|exp)/g, '$1*$2');
    s = s.replace(/(pi)(x)/g, '$1*$2');
    s = s.replace(/(pi)(sin|cos|tan|log|ln|sqrt|abs|exp)/g, '$1*$2');
    return s;
}

function mathToLatex(s) {
    try {
        const node = math.parse(s);
        let tex = node.toTex({ parenthesis: 'keep' });
        tex = tex.replace(/\\cdot\s*/g, '');
        return tex;
    } catch(e) {
        return s;
    }
}

function runCalculation() {
    const raw = document.getElementById('funcInput').value.trim();

    if (!raw) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Please enter a function.</span>';
        return;
    }

    const expr = fixInput(raw);

    let node;
    try { node = math.parse(expr); math.compile(expr).evaluate({x: 0}); }
    catch(e) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Invalid expression: ' + e.message + '</span>';
        return;
    }

    function nodeDependsOnX(n) {
        if (n.type === 'SymbolNode') return n.name === 'x';
        if (n.type === 'ConstantNode') return false;
        if (n.type === 'ParenthesisNode') return nodeDependsOnX(n.content);
        if (n.type === 'FunctionNode') return n.args.some(nodeDependsOnX);
        if (n.type === 'OperatorNode') return n.args.some(nodeDependsOnX);
        return false;
    }

    function simplifyExpr(node) {
        try { return math.simplify(node).toString(); }
        catch(e) { return node.toString(); }
    }

    function integrateNode(n) {
        const t = n.type;

        if (t === 'ParenthesisNode') return integrateNode(n.content);

        if (t === 'ConstantNode') {
            const val = Number(n.value);
            if (val === 0) return math.parse('0');
            return math.parse(val + '*x');
        }

        if (t === 'SymbolNode') {
            if (n.name === 'x') return math.parse('x^2/2');
            return math.parse(n.name + '*x');
        }

        if (t === 'OperatorNode') {
            const op = n.op;
            const args = n.args;

            if (op === '+' && args.length === 2) {
                const leftInt = integrateNode(args[0]);
                const rightInt = integrateNode(args[1]);
                const resStr = '(' + leftInt.toString() + ') + (' + rightInt.toString() + ')';
                return math.parse(resStr);
            }

            if (op === '-' && args.length === 2) {
                const leftInt = integrateNode(args[0]);
                const rightInt = integrateNode(args[1]);
                const resStr = '(' + leftInt.toString() + ') - (' + rightInt.toString() + ')';
                return math.parse(resStr);
            }

            if (op === '+' && args.length === 1) {
                return integrateNode(args[0]);
            }

            if (op === '-' && args.length === 1) {
                const inner = integrateNode(args[0]);
                return math.parse('-(' + inner.toString() + ')');
            }

            if (op === '*') {
                const lS = args[0].toString();
                const rS = args[1].toString();
                const lDep = nodeDependsOnX(args[0]);
                const rDep = nodeDependsOnX(args[1]);
                if (lDep && !rDep) {
                    const i = integrateNode(args[0]);
                    return math.parse(rS + '*(' + i.toString() + ')');
                }
                if (!lDep && rDep) {
                    const i = integrateNode(args[1]);
                    return math.parse(lS + '*(' + i.toString() + ')');
                }
            }

            if (op === '/') {
                const lS = args[0].toString();
                const rS = args[1].toString();
                const lDep = nodeDependsOnX(args[0]);
                const rDep = nodeDependsOnX(args[1]);
                if (!lDep && rDep && rS === 'x') {
                    return math.parse('ln(abs(x))');
                }
                if (!lDep && rDep) {
                    const argInt = integrateNode(args[1]);
                    if (argInt.toString() !== rS) {
                        return math.parse('ln(abs(' + rS + '))');
                    }
                }
            }

            if (op === '^') {
                const base = args[0];
                const exp = args[1];
                const bStr = base.toString();
                const eStr = exp.toString();
                const bDep = nodeDependsOnX(base);
                const eDep = nodeDependsOnX(exp);

                if (bDep && !eDep) {
                    let eNum;
                    try { eNum = Number(exp.evaluate ? exp.evaluate() : parseFloat(eStr)); }
                    catch(e) { eNum = NaN; }
                    if (!isNaN(eNum) && eNum === -1) {
                        return math.parse('ln(abs(' + bStr + '))');
                    }
                    if (!isNaN(eNum)) {
                        const nExp = eNum + 1;
                        return math.parse(bStr + '^' + nExp + '/' + nExp);
                    }
                }
            }
        }

        if (t === 'FunctionNode') {
            const fn = n.fn.name;
            const arg = n.args[0];
            const aS = arg.toString();
            const aDep = nodeDependsOnX(arg);

            if (fn === 'sin' && aDep && arg.type === 'SymbolNode') {
                return math.parse('-cos(' + aS + ')');
            }
            if (fn === 'cos' && aDep && arg.type === 'SymbolNode') {
                return math.parse('sin(' + aS + ')');
            }
            if (fn === 'exp' && aDep && arg.type === 'SymbolNode') {
                return math.parse('exp(' + aS + ')');
            }
            if (fn === 'ln' && aDep && arg.type === 'SymbolNode') {
                return math.parse(aS + '*ln(abs(' + aS + ')) - ' + aS);
            }
        }

        throw new Error('Cannot integrate: ' + n.toString());
    }

    let resultNode;
    try {
        resultNode = integrateNode(node);
    } catch(e) {
        document.getElementById('result').innerHTML = '<span style="color:#c00;">Could not compute integral: ' + e.message + '</span>';
        return;
    }

    const resultStr = simplifyExpr(resultNode);

    const lowerRaw = document.getElementById('lowerLimit').value.trim();
    const upperRaw = document.getElementById('upperLimit').value.trim();
    const hasLimits = lowerRaw !== '' && upperRaw !== '';

    let html = '';
    if (typeof katex !== 'undefined') {
        if (hasLimits) {
            const lower = Number(lowerRaw);
            const upper = Number(upperRaw);
            if (!isNaN(lower) && !isNaN(upper)) {
                const f = math.compile(resultStr);
                const valLower = f.evaluate({x: lower});
                const valUpper = f.evaluate({x: upper});
                const definite = valUpper - valLower;
                html += '<div style="text-align:center; font-size:1.8rem; margin-top:15px;">' +
                        katex.renderToString('\\displaystyle \\int_{' + lowerRaw + '}^{' + upperRaw + '} \\left(' + mathToLatex(expr) + '\\right) \\, dx = ' + definite.toFixed(4), { displayMode: false }) +
                        '</div>';
            } else {
                hasLimits = false;
            }
        }
        if (!hasLimits) {
            html += '<div style="text-align:center; font-size:1.8rem; margin-top:15px;">' +
                    katex.renderToString('\\displaystyle \\int \\left(' + mathToLatex(expr) + '\\right) \\, dx = ' + mathToLatex(resultStr) + ' + C', { displayMode: false }) +
                    '</div>';
        }
    } else {
        if (hasLimits) {
            const lower = Number(lowerRaw);
            const upper = Number(upperRaw);
            if (!isNaN(lower) && !isNaN(upper)) {
                const f = math.compile(resultStr);
                const valLower = f.evaluate({x: lower});
                const valUpper = f.evaluate({x: upper});
                const definite = valUpper - valLower;
                html += '<div style="text-align:center; font-size:1.4rem;">\u222B_' + lowerRaw + '^' + upperRaw + ' ' + expr + ' dx = ' + definite.toFixed(4) + '</div>';
            } else {
                hasLimits = false;
            }
        }
        if (!hasLimits) {
            html += '<div style="text-align:center; font-size:1.4rem;">\u222B ' + expr + ' dx = ' + resultStr + ' + C</div>';
        }
    }

    document.getElementById('result').innerHTML = html;

    document.getElementById('chartContainer').style.display = 'block';
    setTimeout(() => plotCurves(expr), 0);
}

document.getElementById('calcBtn').addEventListener('click', runCalculation);
document.getElementById('funcInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runCalculation();
});

let chartInstance = null;
let zoomRange = 10;
const defaultZoomRange = 10;
let panOffsetX = 0;
let panOffsetY = 0;
let currentFExpr = '';
let isDragging = false;
let dragStartX, dragStartY;

function evaluatePoints(expr, xMin, xMax, steps) {
    const f = math.compile(expr);
    const points = [];
    const step = (xMax - xMin) / steps;
    for (let x = xMin; x <= xMax + step / 2; x += step) {
        try {
            const y = f.evaluate({x});
            if (isFinite(y)) points.push({x, y});
        } catch(e) {}
    }
    return points;
}

function plotCurves(fExpr) {
    currentFExpr = fExpr;
    const ctx = document.getElementById('functionChart').getContext('2d');
    const steps = 500;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    const pts = evaluatePoints(fExpr, viewMin, viewMax, steps);

    if (chartInstance) chartInstance.destroy();

    const overlayPlugin = {
        id: 'overlay',
        afterDraw: function(chart) {
            try {
                const lowerRaw = document.getElementById('lowerLimit').value.trim();
                const upperRaw = document.getElementById('upperLimit').value.trim();
                if (!lowerRaw || !upperRaw) return;
                const lo = Number(lowerRaw);
                const hi = Number(upperRaw);
                if (isNaN(lo) || isNaN(hi)) return;

                const xS = chart.scales.x;
                const yS = chart.scales.y;
                if (!xS || !yS) return;

                const yZero = yS.getPixelForValue(0);
                const c = chart.ctx;
                c.save();

                c.beginPath();
                c.fillStyle = 'rgba(0,0,0,0.12)';
                let started = false;
                let lastPx = 0;
                for (const pt of chart.data.datasets[0].data) {
                    if (pt.x >= lo && pt.x <= hi) {
                        const px = xS.getPixelForValue(pt.x);
                        const py = yS.getPixelForValue(pt.y);
                        if (!started) {
                            c.moveTo(px, yZero);
                            c.lineTo(px, py);
                            started = true;
                        } else {
                            c.lineTo(px, py);
                        }
                        lastPx = px;
                    }
                }
                if (started) {
                    c.lineTo(lastPx, yZero);
                    c.closePath();
                    c.fill();
                }

                c.setLineDash([6, 4]);
                c.strokeStyle = 'rgba(0,0,0,0.5)';
                c.lineWidth = 1.5;
                for (const val of [lo, hi]) {
                    const xPx = xS.getPixelForValue(val);
                    if (xPx >= xS.left && xPx <= xS.right) {
                        for (const pt of chart.data.datasets[0].data) {
                            if (Math.abs(pt.x - val) < 0.005) {
                                const py = yS.getPixelForValue(pt.y);
                                c.beginPath();
                                c.moveTo(xPx, py);
                                c.lineTo(xPx, yZero);
                                c.stroke();
                                break;
                            }
                        }
                    }
                }
                c.setLineDash([]);
                c.restore();
            } catch(e) {}
        }
    };

    chartInstance = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'f(x)',
                data: pts,
                showLine: true,
                borderColor: '#000',
                pointRadius: 0,
                fill: false,
                borderWidth: 2.5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 16 / 9,
            scales: {
                x: {
                    type: 'linear',
                    title: { display: true, text: 'x', align: 'end' },
                    grid: { color: 'rgba(0,0,0,0.1)' },
                    min: viewMin,
                    max: viewMax,
                    position: 'center'
                },
                y: {
                    title: { display: false },
                    grid: { color: 'rgba(0,0,0,0.1)' },
                    min: -zoomRange + panOffsetY,
                    max: zoomRange + panOffsetY,
                    position: 'center'
                }
            },
            plugins: {
                legend: {
                    labels: {
                        font: { family: 'Lora' },
                        usePointStyle: true,
                        pointStyle: 'line'
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return '(' + parseFloat(context.parsed.x.toFixed(4)) + ', ' + parseFloat(context.parsed.y.toFixed(4)) + ')';
                        }
                    }
                }
            }
        },
        plugins: [overlayPlugin]
    });
}

function applyZoom() {
    if (!chartInstance) return;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    const steps = 500;
    if (currentFExpr) {
        chartInstance.data.datasets[0].data = evaluatePoints(currentFExpr, viewMin, viewMax, steps);
    }
    chartInstance.options.scales.x.min = viewMin;
    chartInstance.options.scales.x.max = viewMax;
    chartInstance.options.scales.y.min = -zoomRange + panOffsetY;
    chartInstance.options.scales.y.max = zoomRange + panOffsetY;
    chartInstance.update();
}

document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomRange = Math.max(zoomRange * 0.7, 0.5);
    applyZoom();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomRange = Math.min(zoomRange / 0.7, 50);
    applyZoom();
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
    zoomRange = defaultZoomRange;
    panOffsetX = 0;
    panOffsetY = 0;
    applyZoom();
});

const canvas = document.getElementById('functionChart');
canvas.style.cursor = 'crosshair';
canvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    canvas.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', function(e) {
    if (!isDragging || !chartInstance) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const xScale = chartInstance.scales.x;
    const yScale = chartInstance.scales.y;
    if (xScale && yScale) {
        panOffsetX -= dx / (xScale.getPixelForValue(1) - xScale.getPixelForValue(0));
        panOffsetY += dy / (yScale.getPixelForValue(1) - yScale.getPixelForValue(0));
    }
    applyZoom();
});

document.addEventListener('mouseup', function() {
    if (isDragging) {
        isDragging = false;
        canvas.style.cursor = 'crosshair';
    }
});

</script>

</body>
</html>

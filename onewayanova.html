<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Way ANOVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #f5f5ef;
        color: black;
        font-family: 'Lora', serif;
    }
        .container {
            margin-top: 20px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h1, .section h2 {
            color: black;
        }
        .section h2 {
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .table {
            color: black;
            background-color: #f5f5ef;
            border-color: black;
            border-width: 2px;
        }
        .table th, .table td {
            text-align: center;
            border-color: black;
            border-width: 2px;
        }
        .table thead th {
            background-color: #f5f5ef;
            color: black;
            font-weight: bold;
        }
        .table tbody tr {
            background-color: #f5f5ef;
        }
        .table tbody tr:nth-child(even) {
            background-color: #e8e8e0;
        }
        .table tbody td:first-child {
            background-color: #f5f5ef;
            color: black;
        }
        .table tbody td:not(:first-child) {
            background-color: #f5f5ef;
            color: black;
        }
        .btn-group {
            margin-bottom: 20px;
        }
        .btn-group button {
            margin-right: 5px;
        }
        .btn-primary {
            background-color: black;
            border-color: black;
        }
        .btn-secondary {
            background-color: #555;
            border-color: #555;
        }
        .btn-success {
            background-color: black;
            border-color: black;
        }
        .btn-danger {
            background-color: black;
            border-color: black;
        }
        .btn-info {
            background-color: black;
            border-color: black;
        }
        .btn-primary:hover, .btn-success:hover, .btn-danger:hover, .btn-info:hover {
            background-color: #333;
            border-color: #333;
        }
        input[type="number"] {
            background-color: #f5f5ef;
            color: black;
            border-color: #f5f5ef;
        }
        #results h3, #anovaResults h3 {
            color: black;
        }
        .btn-group button {
            color: #fff;
        }
    </style>
</head>
<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<div class="container">
    <div class="section">
        <h1 class="text-center">One-Way ANOVA</h1>
    </div>

    <div class="section">
        <h2>Enter Data</h2>
        <p>Please enter your data in the table below. Each cell should contain a numeric value representing an observation for that treatment.</p>
        <div class="btn-group">
            <button type="button" class="btn btn-success" id="addRow">Add Row</button>
            <button type="button" class="btn btn-secondary" id="removeRow">Remove Row</button>
            <button type="button" class="btn btn-success" id="addColumn">Add Column</button>
            <button type="button" class="btn btn-secondary" id="removeColumn">Remove Column</button>
            <button type="button" class="btn btn-success" id="calculate">Calculate ANOVA</button>
        </div>
        <form id="anovaForm">
            <table class="table table-bordered" id="dataTable">
                <thead id="tableHead">
                    <tr>
                        <th>Treatment</th>
                        <th>Observation 1</th>
                        <th>Observation 2</th>
                        <th>Observation 3</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td>Treatment 1</td>
                        <td><input type="number" class="form-control" name="obs1[]" required></td>
                        <td><input type="number" class="form-control" name="obs2[]" required></td>
                        <td><input type="number" class="form-control" name="obs3[]" required></td>
                    </tr>
                    <tr>
                        <td>Treatment 2</td>
                        <td><input type="number" class="form-control" name="obs1[]" required></td>
                        <td><input type="number" class="form-control" name="obs2[]" required></td>
                        <td><input type="number" class="form-control" name="obs3[]" required></td>
                    </tr>
                    <tr>
                        <td>Treatment 3</td>
                        <td><input type="number" class="form-control" name="obs1[]" required></td>
                        <td><input type="number" class="form-control" name="obs2[]" required></td>
                        <td><input type="number" class="form-control" name="obs3[]" required></td>
                    </tr>
                </tbody>
            </table>
            <div id="results" class="mt-3"></div>
            <div id="anovaResults" class="mt-3"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.5/jstat.min.js"></script>
<script>
    let rowCounter = 3;
    let columnCounter = 3;
    let tableData = [];

    function updateRowLabels() {
        Array.from(document.querySelectorAll('#dataTableBody tr')).forEach((row, index) => {
            row.cells[0].textContent = `Treatment ${index + 1}`;
        });
    }

    function collectTableData() {
    const tableBody = document.getElementById('dataTableBody');
    tableData = []; // Clear previous data

    Array.from(tableBody.rows).forEach((row) => {
        const rowData = [];
        Array.from(row.cells).slice(1).forEach((cell) => {
            const value = parseFloat(cell.querySelector('input').value) || 0;
            rowData.push(value);
        });
        tableData.push(rowData); // Add the row data (treatment data) to the tableData array
    });
    console.log('Table Data:', tableData);
}

function calculateTotalsAndANOVA() {
    collectTableData(); // Collect the entered data first

    const tableBody = document.getElementById('dataTableBody');
    const numRows = tableBody.rows.length;

    let rowTotals = [];
    let columnTotals = {};
    let grandTotal = 0;
    let numObservations = [];
    let totalObservations = 0; // Number of non-null observations

    // Calculate row totals and column totals
    Array.from(tableBody.rows).forEach((row, rowIndex) => {
        let rowSum = 0;
        let numCells = row.cells.length - 1; // Exclude treatment column

        let nonNullCount = 0;

        Array.from(row.cells).slice(1).forEach((cell, colIndex) => {
            const value = parseFloat(cell.querySelector('input').value);
            if (!isNaN(value)) {
                rowSum += value;
                grandTotal += value;
                nonNullCount += 1;
                
                if (!columnTotals[colIndex]) {
                    columnTotals[colIndex] = 0;
                }
                columnTotals[colIndex] += value;
            }
        });
        rowTotals[rowIndex] = rowSum;
        numObservations.push(nonNullCount);
        totalObservations += nonNullCount;
    });

    // Build a new table with totals
    let totalTableHtml = '<h3>Data Table with Totals:</h3><table class="table table-bordered"><thead><tr><th>Treatment</th>';
    for (let i = 1; i <= Math.max(...numObservations); i++) {
        totalTableHtml += `<th>Observation ${i}</th>`;
    }
    totalTableHtml += '<th>Row Total</th></tr></thead><tbody>';

    Array.from(tableBody.rows).forEach((row, rowIndex) => {
        totalTableHtml += `<tr><td>${row.cells[0].textContent}</td>`;
        Array.from(row.cells).slice(1).forEach((cell, colIndex) => {
            totalTableHtml += `<td>${cell.querySelector('input').value}</td>`;
        });
        totalTableHtml += `<td>${rowTotals[rowIndex]}</td></tr>`;
    });

    totalTableHtml += '<tr><td>Column Totals</td>';
    for (let i = 0; i < Math.max(...numObservations); i++) {
        totalTableHtml += `<td>${columnTotals[i] || 0}</td>`;
    }
    totalTableHtml += `<td>${grandTotal}</td></tr></tbody></table>`;

    document.getElementById('results').innerHTML = totalTableHtml;

    // Calculate ANOVA values
    const grandMean = grandTotal / totalObservations;
    let ssTotal = 0;
    let ssTreatment = 0;
    let ssError = 0;

    // SS Total
    Array.from(tableBody.rows).forEach(row => {
        Array.from(row.cells).slice(1).forEach(cell => {
            const value = parseFloat(cell.querySelector('input').value);
            if (!isNaN(value)) {
                ssTotal += Math.pow(value - grandMean, 2);
            }
        });
    });

    // SS Treatment
    rowTotals.forEach((rowTotal, rowIndex) => {
        const treatmentMean = rowTotal / numObservations[rowIndex];
        ssTreatment += numObservations[rowIndex] * Math.pow(treatmentMean - grandMean, 2);
    });

    // SS Error
    ssError = ssTotal - ssTreatment;

    // Degrees of Freedom
    const dfTotal = totalObservations - 1; // Total df
    const dfTreatment = numRows - 1; // Treatments df
    const dfError = dfTotal - dfTreatment; // Error df

    // Mean Squares
    const msTreatment = ssTreatment / dfTreatment;
    const msError = ssError / dfError;

    // F-statistic
    const fStatistic = msTreatment / msError;

    // Calculate p-value using F-distribution
    function calculatePValue(fStatistic, df1, df2) {
        return 1 - jStat.centralF.cdf(fStatistic, df1, df2);
    }

    const pValue = calculatePValue(fStatistic, dfTreatment, dfError);

    // Build ANOVA table
    const anovaTableHtml = `
        <h3>ANOVA Table:</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Source of Variation</th>
                    <th>SS</th>
                    <th>df</th>
                    <th>MS</th>
                    <th>F</th>
                    <th>p-value</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Treatments</td>
                    <td>${ssTreatment.toFixed(4)}</td>
                    <td>${dfTreatment}</td>
                    <td>${msTreatment.toFixed(4)}</td>
                    <td>${fStatistic.toFixed(4)}</td>
                    <td>${pValue.toFixed(4)}</td>
                </tr>
                <tr>
                    <td>Error</td>
                    <td>${ssError.toFixed(4)}</td>
                    <td>${dfError}</td>
                    <td>${msError.toFixed(4)}</td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Total</td>
                    <td>${ssTotal.toFixed(4)}</td>
                    <td>${dfTotal}</td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>`;

    document.getElementById('anovaResults').innerHTML = anovaTableHtml;
}






    document.getElementById('addRow').addEventListener('click', () => {
    const tableBody = document.getElementById('dataTableBody');
    const newRow = document.createElement('tr');

    // Create the new row HTML
    let newRowHtml = `<td>Treatment ${++rowCounter}</td>`;
    for (let i = 1; i <= columnCounter; i++) {
        newRowHtml += `<td><input type="number" class="form-control" name="obs${i}[]" required></td>`;
    }
    newRowHtml += '</tr>';
    
    // Set the inner HTML of the new row
    newRow.innerHTML = newRowHtml;

    // Append the new row to the table body
    tableBody.appendChild(newRow);

    // Update row labels (treatments)
    updateRowLabels();
});

    document.getElementById('removeRow').addEventListener('click', () => {
        const tableBody = document.getElementById('dataTableBody');
        if (tableBody.rows.length > 1) {
            tableBody.deleteRow(-1);
            rowCounter--;
            updateRowLabels();
        }
    });

    document.getElementById('addColumn').addEventListener('click', () => {
        const tableHead = document.getElementById('tableHead').rows[0];
        const tableBody = document.getElementById('dataTableBody');
        
        // Add new column header
        const newHeader = document.createElement('th');
        newHeader.textContent = `Observation ${++columnCounter}`;
        tableHead.appendChild(newHeader);
        
        // Add new cells to each row
        Array.from(tableBody.rows).forEach((row) => {
            const newCell = document.createElement('td');
            newCell.innerHTML = `<input type="number" class="form-control" name="obs${columnCounter}[]" required>`;
            row.appendChild(newCell);
        });
    });

    document.getElementById('removeColumn').addEventListener('click', () => {
        const tableHead = document.getElementById('tableHead').rows[0];
        const tableBody = document.getElementById('dataTableBody');
        
        if (tableHead.cells.length > 2) { // At least one observation column and the treatment column should remain
            // Remove last column header
            tableHead.deleteCell(-1);
            
            // Remove last cells from each row
            Array.from(tableBody.rows).forEach((row) => {
                row.deleteCell(-1);
            });
            
            columnCounter--;
        }
    });

    document.getElementById('calculate').addEventListener('click', () => {
        calculateTotalsAndANOVA();
    });
</script>



</body>
</html>

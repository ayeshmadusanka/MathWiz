<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secant Method Iteration Table</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #f5f5ef;
            color: black;
            padding: 20px;
        }
        h1 {
            color: black;
            text-align: center;
            margin-bottom: 20px;
        }
        .table-container {
            margin-top: 20px;
            display: none;
        }
        .table-hover tbody tr:hover {
            background-color: #e8e8dc;
        }
        .form-control, .form-label {
            margin-bottom: 15px;
        }
        .form-control {
            background-color: #f5f5ef;
            color: black;
            border: 1px solid black;
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-success {
            background-color: black;
            border-color: black;
        }
        .btn-success:hover {
            background-color: #333;
            border-color: #333;
        }
        .table-dark th, .table-dark td {
            background-color: #f5f5ef;
            color: black;
        }
        .table-dark tbody tr {
            background-color: #f5f5ef;
        }
        .table-dark tbody tr:hover {
            background-color: #e8e8dc;
            color: black !important;
            font-weight: bold !important;
        }
        .table-dark thead th {
            background-color: #e8e8dc;
        }
        .table-bordered, .table-bordered th, .table-bordered td {
            border: 2px solid black !important;
        }
        .zoom-btn {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-container {
            position: relative;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
<style>@media (max-width:768px){.nav-buttons{justify-content:center}}</style>
<div class="nav-buttons" style="padding: 10px 20px; display: flex; gap: 10px; font-family: 'Lora', serif; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
    <a href="index.html" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Home</a>
    <a href="index.html#pricing" style="background: #f5f5ef; color: black; padding: 6px 22px; border-radius: 6px; text-decoration: none; font-size: 1.26rem; border: 1px solid #f5f5ef;">Methods</a>
</div>



<div class="container">
    <h1>Secant Method Iteration Table</h1>

    <!-- Form for user inputs -->
    <form id="secantForm" class="row g-3">
        <div class="col-12 col-md-6 col-lg-3">
            <label for="function" class="form-label">Enter f(x):</label>
            <input type="text" id="function" name="function" class="form-control" value="f(x)" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="initial_guess1" class="form-label">Initial Guess 1 (x₀):</label>
            <input type="number" id="initial_guess1" name="initial_guess1" class="form-control" step="any" value="1" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="initial_guess2" class="form-label">Initial Guess 2 (x₁):</label>
            <input type="number" id="initial_guess2" name="initial_guess2" class="form-control" step="any" value="2" required>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <label for="iterations" class="form-label">Number of Iterations:</label>
            <input type="number" id="iterations" name="iterations" class="form-control" value="10" required>
        </div>
        <div class="col-12 text-center">
            <input type="submit" class="btn btn-success mt-2" value="Calculate">
        </div>
    </form>

    <div class="chart-container">
        <div style="position:absolute;top:-14px;right:8px;z-index:10;display:flex;gap:4px;">
            <button class="btn btn-success btn-sm zoom-btn" id="zoomInBtn">&#43;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomOutBtn">&minus;</button>
            <button class="btn btn-secondary btn-sm zoom-btn" id="zoomResetBtn">&#8634;</button>
        </div>
        <canvas id="functionChart"></canvas>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table id="secantTable" class="table table-hover table-dark table-bordered mt-4">
                <thead>
                    <tr>
                        <th>Iteration</th>
                        <th>x_new</th>
                        <th>f(x)</th>
                        <th>Error</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Table rows will be added here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS and dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.0.0/math.min.js"></script>

<script>
    document.getElementById('secantForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const userFunction = document.getElementById('function').value;
        let x0 = parseFloat(document.getElementById('initial_guess1').value);
        let x1 = parseFloat(document.getElementById('initial_guess2').value);
        const iterations = parseInt(document.getElementById('iterations').value);
        const tolerance = 0.00000001;
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        document.querySelector('.table-container').style.display = 'block';

        let previous_x = x1;
        let rootFound = false;
        let rootX = null;
        const iterPoints = [];
        iterPoints.push({x: x0, y: math.evaluate(userFunction, {x: x0})});
        iterPoints.push({x: x1, y: math.evaluate(userFunction, {x: x1})});

        function evaluateFunction(x) {
            return math.evaluate(userFunction, { x: x });
        }

        for (let i = 1; i <= iterations; i++) {
            const f_x0 = evaluateFunction(x0);
            const f_x1 = evaluateFunction(x1);

            if (f_x1 - f_x0 === 0) {
                tableBody.innerHTML += `<tr><td colspan='4'>Division by zero in secant formula, iteration stopped.</td></tr>`;
                break;
            }

            const x_new = x1 - f_x1 * ((x1 - x0) / (f_x1 - f_x0));
            iterPoints.push({x: x_new, y: evaluateFunction(x_new)});
            const error = Math.abs(x_new - previous_x);

            tableBody.innerHTML += `
                <tr>
                    <td>${i}</td>
                    <td>${x_new.toFixed(8)}</td>
                    <td>${f_x1.toFixed(8)}</td>
                    <td>${error.toFixed(8)}</td>
                </tr>
            `;

            if (Math.abs(f_x1) < tolerance) {
                rootFound = true;
                rootX = x_new;
                tableBody.innerHTML += `<tr><td colspan='4'>Root found: ${x_new.toFixed(8)}</td></tr>`;
                break;
            }

            x0 = x1;
            x1 = x_new;
            previous_x = x_new;
        }

        if (!rootFound) {
            tableBody.innerHTML += "<tr><td colspan='4'>Root not found within the given number of iterations.</td></tr>";
        }

        plotFunction(userFunction, iterPoints, rootFound, rootX);
    });

document.getElementById('function').addEventListener('input', function() {
    const funcStr = this.value;
    if (funcStr.trim()) {
        try {
            math.compile(funcStr);
            plotFunction(funcStr, [], false, null);
        } catch(e) {}
    }
});

let chartInstance = null;
let zoomRange = 10;
let defaultZoomRange = 10;
let currentFuncStr = '';
let panOffsetX = 0;
let panOffsetY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;

function evaluatePoints(expr, xMin, xMax, steps) {
    const f = math.compile(expr);
    const points = [];
    const step = (xMax - xMin) / steps;
    for (let x = xMin; x <= xMax + step / 2; x += step) {
        try {
            const y = f.evaluate({x});
            if (isFinite(y)) points.push({x, y});
        } catch(e) {}
    }
    return points;
}

function plotFunction(funcStr, iterPoints, rootFound, finalX) {
    const ctx = document.getElementById('functionChart').getContext('2d');
    const container = document.querySelector('.chart-container');
    container.style.display = 'block';

    const rootX = rootFound ? finalX : null;
    currentFuncStr = funcStr;
    const f = math.compile(funcStr);

    let range = 10;
    if (rootX !== null || (iterPoints && iterPoints.length > 0)) {
        const allXs = iterPoints.map(p => p.x);
        if (rootX !== null) allXs.push(rootX);
        const maxAbs = Math.max(...allXs.map(Math.abs), 1);
        range = Math.max(10, Math.ceil(maxAbs * 1.5));
    }
    zoomRange = range;
    panOffsetX = 0;
    panOffsetY = 0;
    defaultZoomRange = range;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    const curvePoints = evaluatePoints(currentFuncStr, viewMin, viewMax, 200);

    if (chartInstance) chartInstance.destroy();

    const datasets = [{
        label: `f(x) = ${funcStr}`,
        data: curvePoints,
        borderColor: 'black',
        backgroundColor: 'black',
        pointRadius: 0,
        showLine: true,
        tension: 0.3,
        borderWidth: 2,
        fill: false
    }];

    if (iterPoints && iterPoints.length > 0) {
        datasets.push({
            label: 'Iteration points',
            data: iterPoints,
            borderColor: '#555',
            backgroundColor: '#555',
            pointRadius: 6,
            pointStyle: 'circle',
            showLine: false
        });

    }

    if (rootX !== null) {
        datasets.push({
            label: `Root: x = ${rootX.toFixed(6)}`,
            data: [{x: rootX, y: 0}],
            borderColor: 'black',
            backgroundColor: 'black',
            pointRadius: 8,
            pointStyle: 'cross',
            borderWidth: 3,
            showLine: false
        });
    }



    const linesPlugin = {
        id: 'linesPlugin',
        afterDraw(chart) {
            if (!iterPoints || iterPoints.length === 0) return;
            const ctx = chart.ctx;
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;
            if (!xScale || !yScale) return;
            ctx.save();
            const h = 1e-5;
            for (const dp of iterPoints) {
                if (!dp || !isFinite(dp.x) || !isFinite(dp.y)) continue;
                const px = xScale.getPixelForValue(dp.x);
                const py = yScale.getPixelForValue(dp.y);
                const py0 = yScale.getPixelForValue(0);
                if (!isFinite(px) || !isFinite(py) || !isFinite(py0)) continue;
                ctx.beginPath();
                ctx.setLineDash([6, 4]);
                ctx.moveTo(px, py);
                ctx.lineTo(px, py0);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                try {
                    const slope = (f.evaluate({x: dp.x + h}) - f.evaluate({x: dp.x - h})) / (2 * h);
                    if (isFinite(slope)) {
                        const span = zoomRange / 2.5;
                        const x1 = dp.x - span;
                        const x2 = dp.x + span;
                        const y1 = dp.y + slope * (x1 - dp.x);
                        const y2 = dp.y + slope * (x2 - dp.x);
                        const p1x = xScale.getPixelForValue(x1);
                        const p1y = yScale.getPixelForValue(y1);
                        const p2x = xScale.getPixelForValue(x2);
                        const p2y = yScale.getPixelForValue(y2);
                        if (!isFinite(p1x) || !isFinite(p1y) || !isFinite(p2x) || !isFinite(p2y)) continue;
                        ctx.beginPath();
                        ctx.setLineDash([]);
                        ctx.moveTo(p1x, p1y);
                        ctx.lineTo(p2x, p2y);
                        ctx.strokeStyle = 'rgba(200,50,50,0.7)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                } catch(e) {}
            }
            ctx.setLineDash([]);
            ctx.restore();
        }
    };
    Chart.register(linesPlugin);

    try {
        chartInstance = new Chart(ctx, {
            type: 'scatter',
            data: {datasets},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                aspectRatio: 16/9,
                maintainAspectRatio: true,
                scales: {
                    x: {
                        type: 'linear',
                        title: {display: true, text: 'x', align: 'end'},
                        grid: {color: 'rgba(0,0,0,0.1)'},
                        min: viewMin,
                        max: viewMax,
                        position: 'center'
                    },
                    y: {
                        title: {display: false},
                        grid: {color: 'rgba(0,0,0,0.1)'},
                        min: -zoomRange + panOffsetY,
                        max: zoomRange + panOffsetY,
                        position: 'center'
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            font: {family: 'Lora'}
                        }
                    }
                }
            }
        });
    } catch(e) {
        console.error('Chart error:', e);
    }
}

function applyZoom() {
    if (!chartInstance) return;
    const viewMin = -zoomRange + panOffsetX;
    const viewMax = zoomRange + panOffsetX;
    if (currentFuncStr) {
        chartInstance.data.datasets[0].data = evaluatePoints(currentFuncStr, viewMin, viewMax, 200);
    }
    chartInstance.options.scales.x.min = viewMin;
    chartInstance.options.scales.x.max = viewMax;
    chartInstance.options.scales.y.min = -zoomRange + panOffsetY;
    chartInstance.options.scales.y.max = zoomRange + panOffsetY;
    chartInstance.update();
}

document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomRange = Math.max(zoomRange * 0.7, 0.5);
    applyZoom();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomRange = Math.min(zoomRange / 0.7, 50);
    applyZoom();
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
    zoomRange = defaultZoomRange;
    panOffsetX = 0;
    panOffsetY = 0;
    applyZoom();
});

const canvas = document.getElementById('functionChart');
canvas.style.cursor = 'crosshair';
canvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    canvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', function(e) {
    if (!isDragging || !chartInstance) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const xScale = chartInstance.scales.x;
    const yScale = chartInstance.scales.y;
    if (xScale && yScale) {
        const pxPerUnitX = xScale.getPixelForValue(1) - xScale.getPixelForValue(0);
        const pxPerUnitY = yScale.getPixelForValue(1) - yScale.getPixelForValue(0);
        panOffsetX -= dx / pxPerUnitX;
        panOffsetY += dy / pxPerUnitY;
    }
    applyZoom();
});
document.addEventListener('mouseup', function() {
    if (isDragging) {
        isDragging = false;
        canvas.style.cursor = 'crosshair';
    }
});
</script>



</body>
</html>
